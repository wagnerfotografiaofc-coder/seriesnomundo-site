<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investigação</title>
<style>
body {
  background: #0a0a0a;
  color: #fff;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  height: 100vh;
  margin: 0;
}
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}
.msg {
  margin: 8px 0;
}
.user {
  color: #4caf50;
}
.bot {
  color: #ff5252;
}
input {
  padding: 10px;
  border: none;
  outline: none;
  width: 80%;
}
button {
  width: 20%;
  background: #25d366;
  border: none;
  color: white;
}
</style>
</head>
<body>

<div id="chat"></div>

<div style="display:flex;">
  <input id="input" placeholder="Digite..." />
  <button onclick="send()">Enviar</button>
</div>

<script>
async function send() {
  const input = document.getElementById('input');
  const chat = document.getElementById('chat');

  const text = input.value;
  if (!text) return;

  chat.innerHTML += `<div class="msg user">Você: ${text}</div>`;
  input.value = '';

  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      message: text
    })
  });

  const data = await response.json();

  chat.innerHTML += `<div class="msg bot">IA: ${data.reply}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
